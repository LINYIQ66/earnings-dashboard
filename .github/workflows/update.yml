name: Daily Earnings Update

on:
  schedule:
    # 每天 UTC 10:00 = 美东 06:00 = 北京时间 18:00 (美股盘后)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run daily update
        run: python daily_update.py

      - name: Commit and push changes
        run: |
          git config user.name "KOPI Bot"
          git config user.email "bot@kopiaiagent.com"
          git add docs/data.json docs/earnings_report.html db/*.json
          git diff --staged --quiet || (git commit -m "📊 Daily earnings update $(date +%Y-%m-%d)" && git push)
